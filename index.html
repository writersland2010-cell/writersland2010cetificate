<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>작가랜드 작가증 발급</title>

<style>
body{
font-family: "Malgun Gothic", sans-serif;
background:#fff9c4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:20px;
max-width:650px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.section{
display:none;
}

.section.active{
display:block;
}

input,select,textarea{
width:90%;
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#5c6bc0;
color:white;
border:none;
padding:15px 30px;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

canvas{
margin-top:25px;
max-width:100%;
display:none;
}

#downloadBtn{
display:none;
background:#4CAF50;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>📜 작가랜드 작가증 📜</h1>

<!-- 1페이지 -->
<div class="section active" id="section1">
<h3>✏️ 작가증 발급 정보</h3>

<input id="org" placeholder="소속(기관명)">
<input id="name" placeholder="성명">
<input id="book" placeholder="도서 제목">
<input id="date" type="date">

<p style="font-size:12px; color:#777;">
※ 판권지를 확인하신 후 판권 날짜를 입력해 주세요.
</p>

<label>📷 책 표지 이미지 업로드 (선택)</label>
<input type="file" id="cover" accept="image/*">

<button onclick="nextSection(1)">다음</button>
</div>

<!-- 2페이지 -->
<div class="section" id="section2">
<h3>✅ 수업 만족도</h3>

<label>Q1. 강사의 수업에 만족하시나요?</label>
<select id="q1">
<option>5 매우 만족</option>
<option>4 만족</option>
<option>3 보통</option>
<option>2 불만족</option>
<option>1 매우 불만족</option>
</select>
<br>

<label>Q2. 그렇게 느낀 이유는 무엇인가요?</label>
<textarea id="q2"></textarea>

<button onclick="nextSection(2)">다음</button>
</div>

<!-- 3페이지 -->
<div class="section" id="section3">
<h3>📚 결과물 만족도</h3>

<label>Q3. 완성된 책 디자인은 만족하시나요?</label>
<select id="q3">
<option>5 매우 만족</option>
<option>4 만족</option>
<option>3 보통</option>
<option>2 불만족</option>
<option>1 매우 불만족</option>
</select>
<br>
<label>Q4. 제작된 책의 품질(인쇄, 제본 등)은 어떠셨나요?</label>
<select id="q4">
<option>5 매우 좋음</option>
<option>4 좋음</option>
<option>3 보통</option>
<option>2 아쉬움</option>
<option>1 매우 아쉬움</option>
</select>
<br>
<label>결과물에 대한 총평을 남겨주세요.</label>
<textarea id="q5"></textarea>

<button onclick="nextSection(3)">다음</button>
</div>

<!-- 4페이지 -->
<div class="section" id="section4">
<h3>🚀 추가 수업 신청</h3>
<p style="font-size:14px; color:#777;">
본 수업과 연계된 추가 교육 및 업그레이드 수업 참여를 원하신다면, 아래 정보를 남겨주세요.
<br>
(대면·비대면 교육 선택이 가능하며,
교육 일정에 맞춰 순차적으로 연락드리겠습니다.)
<input id="upgrade_name" placeholder="성함">
<input id="upgrade_phone" placeholder="연락처">
<input id="upgrade_age" placeholder="나이">

<h3 style="font-size:18px;">
⭐ 작가랜드에 상담을 받고 싶은 내용이나 질문이 있으시다면 작성해주세요.</h3>
<textarea id="comment"></textarea>

<button onclick="makeCertificate()">작가증 발급하기</button>

<canvas id="canvas"></canvas>

<a id="downloadLink">
<button id="downloadBtn">작가증 다운로드</button>
</a>

</div>

</div>

document.getElementById("section"+num).classList.remove("active");

    reader.onload = function(e){
        coverImg.src = e.target.result;
     
        coverImg.onload = function(){
          
            ctx.textAlign = "left";
            ctx.font="20px sans-serif";
          
            ctx.fillText(org,canvas.width/3.5,canvas.height*0.363);
            ctx.fillText(name,canvas.width/3.5,canvas.height*0.403);
          
            const maxChars = 10; 
            const textX = canvas.width/3.5;
            const baseY = canvas.height*0.443;
            
            if((book || "").length > maxChars){
              ctx.fillText(book.slice(0, maxChars), textX, baseY);
              ctx.fillText(book.slice(maxChars), textX, baseY + 24);
              } else {
                ctx.fillText(book, textX, baseY);
              }
            ctx.textAlign="center";
            ctx.font="26px sans-serif";
            ctx.fillText(date,canvas.width/2,canvas.height*0.75);


            // 최대 영역
            const maxW = canvas.width * 0.18;
            const maxH = canvas.height * 0.25;

            // 원본 비율 유지
            let ratio = Math.min(maxW / coverImg.width, maxH / coverImg.height);
            let w = coverImg.width * ratio;
            let h = coverImg.height * ratio;

            // 이미지 위치 (영역 안 가운데)
            let x = canvas.width*0.62 + (maxW - w)/2;
            let y = canvas.height*0.28 + (maxH - h)/2;

            ctx.drawImage(coverImg, x, y, w, h);

            // 캔버스 표시 & 다운로드
            canvas.style.display="block";
            const link=document.getElementById("downloadLink");
            const btn=document.getElementById("downloadBtn");
            link.href=canvas.toDataURL();
            link.download=name+"_작가증.png";
            btn.style.display="inline-block";
        };
    };

}
